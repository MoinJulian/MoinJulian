<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>ToDo App</title>
        <link rel="stylesheet" href="./todoliste/todoliste.css" />
        <script src="./todoliste/todoliste.js" defer></script>
    </head>
    <body>
        <h1>Todos</h1>
        <form id="form">
            <input
                type="text"
                id="input"
                class="input"
                placeholder="Enter your todo"
                autocomplete="off"
            />
            <ul class="todos" id="todos"></ul>
        </form>
        <small
            >Links click um abgeschlossen einzustellen / auszuschalten. <br />Rechts click um das Todo zu löschen!</small
        >
    </body>
</html>
