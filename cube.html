<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <link rel="icon" href="./img/moinjulian.ico" type="image/x-icon">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Cube</title>
    <link rel="stylesheet" href="./css/cube.css">

</head>
<body>
    <a href="index.html">Haupseite</a>

    <main id ="stage">
        <div id="cube">
            <div style="--color: green" class="face front">
                <div class="faceContent"></div>
            </div>
            <div style="--color: blue" class="face back">
                <div class="faceContent"></div>  
            </div>
            <div style="--color: white" class="face top">
                <div class="faceContent"></div> 
            </div>
            <div style="--color: yellow" class="face bottom">
                <div class="faceContent"></div>
            </div>
            <div style="--color: red" class="face left">
                <div class="faceContent"></div> 
            </div>
            <div style="--color: orange" class="face right">
                <div class="faceContent"></div>
            </div>
        </div>
    </main>

</body>
</html>
