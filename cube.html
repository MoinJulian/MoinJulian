<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3d Cube</title>
    <link rel="stylesheet" href="./css/cube.css">
</head>
<body>
    <a href="index.html">Haupseite</a>

    <main id ="stage">
        <div id="cube">
            <div style="--color: green" class="face front">
                <div class="faceContent">G</div>
            </div>
            <div style="--color: blue" class="face back">
                <div class="faceContent">B</div>  
            </div>
            <div style="--color: white" class="face top">
                <div class="faceContent">W</div> 
            </div>
            <div style="--color: yellow" class="face bottom">
                <div class="faceContent">Y</div>
            </div>
            <div style="--color: red" class="face left">
                <div class="faceContent">R</div> 
            </div>
            <div style="--color: orange" class="face right">
                <div class="faceContent">O</div>
            </div>
        </div>
    </main>
</body>
</html>
