<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/calculator.css">
    <link rel="icon" href="./icon/favicon-32x32-seochecker-manifest-620.jpeg" type="image/x-icon">
    <title>Taschenrechner</title>
    <script src="./calculatorskript/calculator.js"></script>
</head>
<body>
    <p id="taschenrechner">Hier habt ihr auch noch einen Taschenrechner</p>
    <a href="./de-index.html">Hauptseite</a>
    <br>
    <div id="resultArea"></div>

    <table>
        <tr>
            <td onclick="appendOperation('(')" class="highlight">(</td>
            <td onclick="appendOperation(')')" class="highlight">)</td>
            <td onclick="deleteAll()" class="highlight">DEL ALL (a)</td>
            <td onclick="deleteLast()" class="highlight">DEL (d)</td>
        </tr>

        <tr>
            <td onclick="appendOperation(7)">7</td>
            <td onclick="appendOperation(8)">8</td>
            <td onclick="appendOperation(9)">9</td>
            <td onclick="appendOperation(' / ')" class="highlight">/</td>
        </tr>

        <tr>
            <td onclick="appendOperation(4)">4</td>
            <td onclick="appendOperation(5)">5</td>
            <td onclick="appendOperation(6)">6</td>
            <td onclick="appendOperation(' * ')" class="highlight">x</td>
        </tr>

        <tr>
            <td onclick="appendOperation(1)">1</td>
            <td onclick="appendOperation(2)">2</td>
            <td onclick="appendOperation(3)">3</td>
            <td onclick="appendOperation(' + ')" class="highlight">+</td>
        </tr>

        <tr>
            <td onclick="appendOperation(0)">0</td>
            <td onclick="appendOperation('.')" class="highlight">.</td>
            <td onclick="calculatResult()" id="result">= (Leertaste)</td>
            <td onclick="appendOperation(' - ')" class="highlight">-</td>
        </tr>

    </table>

</bod>
</html>
