<!DOCTYPE html>
<html lang="de">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>ToDo App</title>
        <link rel="stylesheet" href="../index/index.css">
        <link rel="stylesheet" href="todoliste.css" />
        <script src="todoliste.js" defer></script>
    </head>
    <body>
        <a href="../../sprachen/english.html" class="link" id="link">Main Site</a>
        <h1>Todos</h1>
        <form id="form">
            <input
                type="text"
                id="input"
                class="input"
                placeholder="Todo eingeben"
                autocomplete="off"
            />
            <ul class="todos" id="todos"></ul>
        </form>
        <small
            >Left click to toggle complete! <br />
            Right click to clear!</small
        >
    </body>
</html>
