<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="./img/moinjulian.ico" type="image/x-icon">
    <title>Eieruhr</title>
    <link rel="manifest" href="manifest.json">

    <style>
        .background-dark {
            background-color: #262626;
        }
        
        .center {
            display: flex;
            justify-content: center;
        }
        
        a {
            color: white;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .margin-top {
            margin-top: 100px;
        }
        
        .timer {
            font-size: 30px;
            color: white;
            font-family: 'Roboto', sans-serif;
        }

        .start {
            width: 10vw;
            height: 5vh;
            background-color: darkred;
        }

        #stop {
            display: flex;
            justify-content: center;
            align-items: center;
            
        }

        #start {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .start:hover {
            cursor: pointer;
        }

    </style>

    <script>
        let alarm = new Audio('./alarm/Eieruhr_alarm.mp3');
        let timerStarted = false;
        let timerlenght = 5 + 0.02;

        function stopTimer() {
            if (timerStarted) {
                let stopTimer = location.reload();
            }
        }

        function startTimer() {
            if (!timerStarted) {
                let startTime = new Date().getTime();
                let fiveMinutes = 1000 * 60 * timerlenght;
                let endTime = startTime + fiveMinutes;


                setInterval(function() {
                    let timeLeft = endTime - new Date().getTime();


                    if (timeLeft > 0) {
                        let minutes = timeLeft / (1000 * 60);
                        minutes = Math.floor(minutes);
                        let seconds = (timeLeft / 1000) % 60;
                        seconds = Math.round(seconds);
                        seconds = ('0' + seconds).slice(-2);
                        let text = '0'  +  minutes  +  ' : '  +  seconds;
                        timer.innerHTML = text;
                    } else {
                        alarm.play();
                        timer.innerHTML = '00 : 00';
                    }
                }, 1000);
                timerStarted = true;
            }
        }
    </script>

</head>

<body class="background-dark">
    <a href="index.html">Hauptseite</a>

    <div class="center margin-top timer" id="timer">Deine Zeit läuft sobald du auf Start drückst!</div>


    <div class="center margin-top timer">
        <table>
            <td onclick="startTimer()" class="start" id="start">Start</td>
            <td onclick="stopTimer()" class="start" id="stop">Stop</td>
        </table>
    </div>

</body>

</html>
