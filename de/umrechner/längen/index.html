<!DOCTYPE html>
<html lang="de">
<head>

    <link rel="stylesheet" href="./style.css">

    <title>Temperatur Umrechner</title>

<body>
    <a href="../index.html"  class="link">Umrechner Hub</a>
    <div class="umrechner">
        <div class="eingabefeld">
            <input type="number" step="any" id="meter-eingabefeld">
            <label for="meter-eingabefeld" class="bezeichner">Meter</label>
        </div>
        <div class="gleichheitszeichen">=</div>
        <div class="eingabefeld">
            <input type="number" step="any" id="zentimeter-eingabefeld">
            <label for="zentimeter-eingabefeld" class="bezeichner">Zentimeter</label>
        </div>
        <div class="gleichheitszeichen">=</div>
        <div class="eingabefeld">
            <input type="number" step="any" id="millimeter-eingabefeld">
            <label for="millimeter-eingabefeld" class="bezeichner">Millimeter</label>
        </div>
        <div class="gleichheitszeichen">=</div>
        <div class="eingabefeld">
            <input type="number" step="any" id="mikrometer-eingabefeld">
            <label for="mikrometer-eingabefeld" class="bezeichner">Mikrometer</label>
        </div>
        <div class="gleichheitszeichen">=</div>
        <div class="eingabefeld">
            <input type="number" step="any" id="nanometer-eingabefeld">
            <label for="nanometer-eingabefeld" class="bezeichner">Nanometer</label>
        </div>
    </div>
