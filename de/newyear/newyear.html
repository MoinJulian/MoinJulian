<!DOCTYPE html>
<html lang="de">
  <head>
    <link rel="icon" href="./icon/favicon-32x32-seochecker-manifest-620.jpeg" type="image/x-icon">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Neujahrs Countdown</title>
    <!-- Google Font -->
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;800&display=swap"
      rel="stylesheet"
    />
    <!-- Stylesheet -->
    <link rel="stylesheet" href="newyear.css" />
  </head>
  <body>
      <a href="../../index.html" class="link">Haupseite</a>
    <div class="wrapper">
      <div class="heading">
        <h3>Countdown bis:</h3>
        <h1>2023</h1>
      </div>
      <div class="countdown">
        <div class="box">
          <span class="num" id="day-box">00</span>
          <span class="text">Tage</span>
        </div>
        <div class="box">
          <span class="num" id="hr-box">00</span>
          <span class="text">Stunden</span>
        </div>
        <div class="box">
          <span class="num" id="min-box">00</span>
          <span class="text">Minuten</span>
        </div>
        <div class="box">
          <span class="num" id="sec-box">00</span>
          <span class="text">Sekunden</span>
        </div>
      </div>
    </div>
    <!-- Script -->
    <script src="newyear.js"></script>
  </body>
</html>
